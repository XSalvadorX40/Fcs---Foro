<!DOCTYPE html>
<html>
<head>
  <title>Fcs > Foro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f1117;
      color: white;
      display: flex;
      height: 100vh;
    }

    .left {
      width: 35%;
      padding: 20px;
      border-right: 1px solid #222;
    }

    .right {
      width: 65%;
      padding: 20px;
      overflow-y: auto;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #1c1f26;
      border: none;
      color: white;
      border-radius: 5px;
    }

    button {
      background: #00ffff;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }

    .post {
      background: #1c1f26;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 5px;
    }

    .post h3 {
      margin: 0 0 5px 0;
    }

    .meta {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<div class="left">
  <h2>Crear publicación</h2>
  <input type="text" id="title" placeholder="Título">
  <textarea id="content" placeholder="Escribe tu publicación..."></textarea>
  <button onclick="createPost()">Publicar</button>
</div>

<div class="right">
  <h2>Publicaciones</h2>
  <div id="posts"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, collection, addDoc, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwZ62fsdkdy4-LkHkLcmV9K-7nCmtow9g",
  authDomain: "fcs-foro.firebaseapp.com",
  projectId: "fcs-foro",
  storageBucket: "fcs-foro.firebasestorage.app",
  messagingSenderId: "838431044598",
  appId: "1:838431044598:web:156b51480488be28130dd7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let currentUsername = null;

window.createPost = async function() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  if (!title || !content) {
    alert("Completa todos los campos");
    return;
  }

  await addDoc(collection(db, "posts"), {
    title: title,
    content: content,
    username: currentUser.displayName || currentUser.email,
    createdAt: new Date()
  });

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
};

import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if (userSnap.exists()) {
      currentUsername = userSnap.data().username;
    }

  } else {
    signInWithPopup(auth, provider);
  }
});

const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  snapshot.forEach((doc) => {
    const data = doc.data();
    postsDiv.innerHTML += `
      <div class="post">
        <div class="meta">${data.username}</div>
        <h3>${data.title}</h3>
        <p>${data.content}</p>
      </div>
    `;
  });
});

</script>

</body>
</html>
