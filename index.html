<!DOCTYPE html>
<html>
<head>
  <title>Fcs > Foro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f1117;
      color: white;
      font-family: Arial;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin-top: 40px;
      font-size: 40px;
    }

    button {
      background: #00ffff;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Fcs > Foro</h1>

<div id="loginArea">
  <button onclick="login()">Iniciar sesión con Google</button>
</div>

<div id="userInfo" style="display:none;">
  <p id="userEmail"></p>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwZ62fsdkdy4-LkHkLcmV9K-7nCmtow9g",
  authDomain: "fcs-foro.firebaseapp.com",
  projectId: "fcs-foro",
  storageBucket: "fcs-foro.firebasestorage.app",
  messagingSenderId: "838431044598",
  appId: "1:838431044598:web:156b51480488be28130dd7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window.login = async function() {
  await signInWithPopup(auth, provider);
};

window.logout = async function() {
  await signOut(auth);
};

async function checkUser(user) {
  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    askUsername(user);
  } else {
    showUser(userSnap.data().username);
  }
}

async function askUsername(user) {
  const username = prompt("Elige un nombre de usuario único:");

  if (!username) return;

  const q = query(collection(db, "users"), where("username", "==", username));
  const querySnapshot = await getDocs(q);

  if (!querySnapshot.empty) {
    alert("Ese nombre ya está en uso.");
    askUsername(user);
    return;
  }

  await setDoc(doc(db, "users", user.uid), {
    email: user.email,
    username: username,
    puntos: 0,
    rol: "usuario",
    fechaRegistro: new Date()
  });

  showUser(username);
}

function showUser(username) {
  document.getElementById("loginArea").style.display = "none";
  document.getElementById("userInfo").style.display = "block";
  document.getElementById("userEmail").innerText = "Usuario: " + username;
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    checkUser(user);
  } else {
    document.getElementById("loginArea").style.display = "block";
    document.getElementById("userInfo").style.display = "none";
  }
});

</script>

</body>
</html>
